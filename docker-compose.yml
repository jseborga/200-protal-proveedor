version: "3.8"

services:
  # ── App FastAPI ──────────────────────────────────────
  app:
    build: .
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./frontend:/app/frontend
      - ./migrations:/app/migrations
    restart: unless-stopped

  # ── PostgreSQL ───────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: apu_mkt
      POSTGRES_PASSWORD: apu_mkt_dev
      POSTGRES_DB: apu_marketplace
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apu_mkt -d apu_marketplace"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Evolution API (WhatsApp) ─────────────────────────
  evolution-api:
    image: atendai/evolution-api:latest
    ports:
      - "8080:8080"
    environment:
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-dev-evo-key}
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://apu_mkt:apu_mkt_dev@db:5432/apu_marketplace
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - messaging

volumes:
  pgdata:
